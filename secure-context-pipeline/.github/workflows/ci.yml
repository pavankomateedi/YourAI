name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[api] mypy

      - name: Secret scan (no hardcoded keys in source)
        run: |
          if grep -rEn "sk-ant-[A-Za-z0-9]|api_key\s*=\s*['\"]sk" \
              secure_context_pipeline/ scripts/ tests/; then
            echo "::error::Possible hardcoded secret found"; exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Type check (mypy)
        run: mypy secure_context_pipeline

      - name: Validate golden fixtures
        run: python tests/fixtures/golden/validate_fixtures.py --fixture-dir tests/fixtures/golden

      - name: Run test suite
        run: pytest tests/ -q

      - name: Detection recall benchmark
        run: python scripts/recall_benchmark.py --min-recall 0.80

      - name: PII leakage scan (100 runs)
        run: python scripts/pii_leakage_scan.py --runs 100

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build full NER image and run suite in-container
        run: |
          docker compose build
          docker compose run --rm app pytest tests/ -q
